name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: playru_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest-cov

    - name: Run Django tests
      env:
        DJANGO_SETTINGS_MODULE: config.settings.development
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: playru_test
        DB_USER: postgres
        DB_PASSWORD: testpass
        DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        DJANGO_DEBUG: "True"
      run: |
        cd backend
        python manage.py migrate
        pytest tests/ -v --tb=short --cov=apps --cov-report=term-missing

    - name: Check Django configuration
      env:
        DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: playru_test
        DB_USER: postgres
        DB_PASSWORD: testpass
      run: |
        cd backend
        python manage.py check --deploy --settings=config.settings.production \
          || echo "Deploy check warnings (expected in CI)"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Lint with flake8
      run: |
        pip install flake8
        cd backend
        flake8 apps/ --max-line-length=120 --ignore=E501,W503 || true

    - name: Validate K8s YAML
      run: |
        pip install pyyaml
        python3 -c "
        import yaml, os, sys
        errors = []
        for root, dirs, files in os.walk('k8s'):
            dirs[:] = [d for d in dirs if d != '.git']
            for f in files:
                if f.endswith('.yaml') and 'secrets' not in f:
                    path = os.path.join(root, f)
                    try:
                        with open(path) as fp: yaml.safe_load(fp)
                    except Exception as e:
                        errors.append(f'{path}: {e}')
        if errors:
            for e in errors: print('FAIL:', e)
            sys.exit(1)
        print(f'OK: All YAML valid')
        "

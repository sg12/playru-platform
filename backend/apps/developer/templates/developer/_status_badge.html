<span class="inline-block px-2.5 py-0.5 text-xs font-medium rounded-full
    {% if status == 'draft' %}bg-slate-600 text-slate-300
    {% elif status == 'pending' %}bg-yellow-900/50 text-yellow-300 border border-yellow-700
    {% elif status == 'approved' %}bg-green-900/50 text-green-300 border border-green-700
    {% elif status == 'rejected' %}bg-red-900/50 text-red-300 border border-red-700
    {% elif status == 'published' %}bg-blue-900/50 text-blue-300 border border-blue-700
    {% endif %}">
    {% if status == 'draft' %}Черновик
    {% elif status == 'pending' %}На модерации
    {% elif status == 'approved' %}Одобрена
    {% elif status == 'rejected' %}Отклонена
    {% elif status == 'published' %}Опубликована
    {% endif %}
</span>

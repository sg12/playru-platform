{% extends "developer/base.html" %}
{% block title %}Вход — PlayRU Developer{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-white mb-8 text-center">Вход в кабинет</h1>

    {% if error %}
    <div class="mb-4 px-4 py-3 bg-red-900/50 text-red-300 border border-red-800 rounded-lg text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-sm text-slate-400 mb-1">Логин</label>
            <input type="text" name="username" required
                   class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                   placeholder="Логин">
        </div>
        <div>
            <label class="block text-sm text-slate-400 mb-1">Пароль</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                   placeholder="Пароль">
        </div>
        <button type="submit"
                class="w-full py-3 bg-accent hover:bg-blue-700 text-white font-medium rounded-lg transition">
            Войти
        </button>
    </form>

    <p class="text-center text-sm text-slate-400 mt-6">
        Нет аккаунта? <a href="{% url 'developer:register' %}" class="text-accent hover:underline">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}

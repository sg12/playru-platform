<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PlayRU Developer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0F172A',
                        'dark-card': '#1E293B',
                        'dark-border': '#334155',
                        accent: '#2563EB',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-slate-200 min-h-screen flex flex-col">
    <nav class="bg-dark-card border-b border-dark-border sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="{% url 'developer:dashboard' %}" class="text-xl font-bold text-white">
                Play<span class="text-accent">RU</span>
                <span class="text-sm font-normal text-slate-400 ml-2">Developer</span>
            </a>
            {% if user.is_authenticated %}
            <div class="flex items-center gap-6 text-sm">
                <a href="{% url 'developer:dashboard' %}" class="text-slate-300 hover:text-white transition">Дашборд</a>
                <a href="{% url 'developer:games_list' %}" class="text-slate-300 hover:text-white transition">Игры</a>
                <a href="{% url 'developer:profile' %}" class="text-slate-300 hover:text-white transition">Профиль</a>
                <a href="{% url 'developer:logout' %}" class="text-slate-400 hover:text-red-400 transition">Выйти</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-8">
        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for message in messages %}
            <div class="px-4 py-3 rounded-lg text-sm
                {% if message.tags == 'error' %}bg-red-900/50 text-red-300 border border-red-800
                {% elif message.tags == 'success' %}bg-green-900/50 text-green-300 border border-green-800
                {% else %}bg-blue-900/50 text-blue-300 border border-blue-800{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-dark-border py-6 text-center text-sm text-slate-500">
        &copy; 2026 PlayRU — Кабинет разработчика
    </footer>
</body>
</html>

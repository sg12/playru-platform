<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PlayRU{% endblock %} — Игровая платформа</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            purple: '#6C3CE1',
                            yellow: '#FFD600',
                            dark: '#1A1A2E',
                            darker: '#12121F',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #6C3CE1, #FFD600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(108, 60, 225, 0.3); }
    </style>
</head>
<body class="bg-brand-dark text-white min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-brand-darker/80 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{% url 'store:home' %}" class="text-2xl font-bold gradient-text">PlayRU</a>
            <div class="flex items-center gap-4 text-sm">
                <a href="{% url 'store:home' %}" class="hover:text-brand-purple transition">Игры</a>
                <a href="{% url 'store:download' %}" class="hover:text-brand-purple transition">Скачать</a>
                <a href="{% url 'store:developer_apply' %}" class="bg-brand-purple hover:bg-purple-700 px-4 py-2 rounded-lg transition font-medium">Стать разработчиком</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-brand-darker border-t border-gray-800 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
            <p class="font-bold text-lg gradient-text mb-2">PlayRU</p>
            <p>&copy; 2026 PlayRU. Игровая платформа для детей и подростков.</p>
            <div class="mt-4 flex justify-center gap-6">
                <a href="{% url 'store:download' %}" class="hover:text-white transition">Скачать</a>
                <a href="{% url 'store:developer_apply' %}" class="hover:text-white transition">Разработчикам</a>
            </div>
        </div>
    </footer>
</body>
</html>

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: playru
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'django'
        static_configs:
          - targets: ['django:8000']
        metrics_path: '/metrics'

      - job_name: 'nakama'
        static_configs:
          - targets: ['nakama:7350']
        metrics_path: '/metrics'

      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files:
      - /etc/prometheus/alerts.yml

  alerts.yml: |
    groups:
    - name: playru
      rules:
      - alert: DjangoDown
        expr: up{job="django"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Django API is down"

      - alert: NakamaDown
        expr: up{job="nakama"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nakama game server is down"

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes > 800000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"

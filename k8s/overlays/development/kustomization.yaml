apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: playru-dev

resources:
  - ../../namespace.yaml
  - ../../postgres/deployment.yaml
  - ../../postgres/service.yaml
  - ../../postgres/pvc.yaml
  - ../../nakama/deployment.yaml
  - ../../nakama/service.yaml
  - ../../django/deployment.yaml
  - ../../django/service.yaml

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/resources/requests/memory
        value: "128Mi"
    target:
      kind: Deployment
      name: nakama
